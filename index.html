<!DOCTYPE html>
<!DOCTYPE html>
<html>

<head>

<title>Ghany AI Studio V8</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

nav{
background:#020617;
padding:15px;
display:flex;
justify-content:space-between;
border-bottom:1px solid #1e293b;
}

.logo{
font-weight:bold;
font-size:18px;
}

.container{
max-width:1100px;
margin:auto;
padding:40px;
}

.card{
background:#020617;
border:1px solid #1e293b;
border-radius:12px;
padding:20px;
margin-bottom:25px;
}

input,select{
width:100%;
padding:10px;
margin:10px 0;
border-radius:8px;
border:none;
}

button{
padding:10px 18px;
border:none;
border-radius:8px;
background:#7c3aed;
color:white;
cursor:pointer;
}

button:hover{
background:#9333ea;
}

.result{
margin-top:15px;
background:#020617;
border:1px solid #1e293b;
padding:15px;
border-radius:10px;
white-space:pre-line;
}

.prompt{
padding:10px;
border-bottom:1px solid #1e293b;
cursor:pointer;
}

.prompt:hover{
background:#1e293b;
}

img{
max-width:200px;
border-radius:10px;
margin-top:10px;
}

.library p{
cursor:pointer;
padding:6px;
}

.library p:hover{
background:#1e293b;
}

</style>

</head>

<body>

<nav>

<div class="logo">Ghany AI Studio V8</div>

<div>AI Prompt Platform</div>

</nav>


<div class="container">


<div class="card">

<h2>AI Video Prompt Generator</h2>

<input id="idea" placeholder="Ide video">

<input id="character" placeholder="Karakter utama">

<input id="location" placeholder="Lokasi">

<select id="mode">

<option value="cinematic">Cinematic Film</option>
<option value="tiktok">TikTok Viral</option>
<option value="asmr">ASMR</option>
<option value="documentary">Documentary</option>
<option value="animation">Animation</option>

</select>

<select id="scene">

<option value="3">3 Scene</option>
<option value="5">5 Scene</option>
<option value="7">7 Scene</option>

</select>

<button onclick="generateStory()">Generate Story + Prompt</button>

</div>


<div class="card">

<h3>Upload Image Reference</h3>

<input type="file" id="imgUpload" onchange="previewImage()">

<div id="imgPreview"></div>

</div>


<div class="card">

<h3>Generated Result</h3>

<div id="result"></div>

<button onclick="savePrompt()">Save Prompt</button>

</div>


<div class="card library">

<h3>Prompt Library</h3>

<p onclick="useIdea(this)">Kucing menjadi chef di restoran mewah</p>

<p onclick="useIdea(this)">Petualang menemukan kota tersembunyi di hutan</p>

<p onclick="useIdea(this)">Drone cinematic menjelajah kota cyberpunk</p>

<p onclick="useIdea(this)">Orang utan menjadi vlogger di hutan</p>

</div>


</div>


<script>

function generateStory(){

let idea=document.getElementById("idea").value
let character=document.getElementById("character").value
let location=document.getElementById("location").value
let mode=document.getElementById("mode").value
let scene=document.getElementById("scene").value

let story=`Story Idea

${idea}

Character
${character}

Location
${location}

Mode
${mode}

`

for(let i=1;i<=scene;i++){

story+=`

Scene ${i}

Superrealistic
Natural human movement
word lighting
Hight detail facial expresif
cinematic film look

`

}

document.getElementById("result").innerText=story

}


function previewImage(){

let file=document.getElementById("imgUpload").files[0]

let reader=new FileReader()

reader.onload=function(){

document.getElementById("imgPreview").innerHTML="<img src='"+reader.result+"'>"

}

reader.readAsDataURL(file)

}


function useIdea(el){

document.getElementById("idea").value=el.innerText

}


function savePrompt(){

let text=document.getElementById("result").innerText

localStorage.setItem("ghanyPrompt",text)

alert("Prompt saved")

}

</script>


</body>
  </html>
