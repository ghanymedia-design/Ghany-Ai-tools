<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghany Media Tools V3 - AI Content & Video Factory</title>
<style>
body{font-family:Arial,Helvetica,sans-serif;background:#020617;color:white;margin:0;padding:20px}
h1{text-align:center;margin-bottom:4px}
p.subtitle{text-align:center;opacity:.85;margin-top:0}
.container{max-width:1300px;margin:auto}
.top{background:#0f172a;border:1px solid #1e293b;border-radius:12px;padding:15px;margin-bottom:20px}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-top:20px}
.box{background:#0f172a;border-radius:12px;padding:10px;text-align:center;border:1px solid #1e293b}
.box img{width:100%;height:100px;object-fit:cover;border-radius:6px;margin-top:6px}
.box textarea{width:100%;margin-top:6px;height:55px;border-radius:6px;border:none;padding:6px}
.controls{text-align:center;margin-top:18px}
button{background:#22c55e;border:none;padding:11px 16px;border-radius:8px;color:white;font-weight:bold;cursor:pointer;margin:4px}
button.secondary{background:#3b82f6}
button.orange{background:#f97316}
button.dark{background:#475569}
button:hover{opacity:.9}
textarea#output{width:100%;height:230px;margin-top:18px;border-radius:10px;border:none;padding:10px}
input,select{padding:8px;border-radius:6px;border:none;margin:4px}
.section{margin-top:15px}
.footer{text-align:center;margin-top:35px;opacity:.6;font-size:13px}
.badge{background:#22c55e;padding:3px 8px;border-radius:6px;font-size:12px;margin-left:6px}
</style>
</head>
<body>
<div class="container"><h1>Ghany Media Tools V3 <span class="badge">AI Content Factory</span></h1>
<p class="subtitle">Create Viral Hooks, Affiliate Scripts, and 10‑Scene AI Videos</p><div class="top"><div class="section">
<b>Video Settings</b><br>
<select id="model">
<option value="veo">Google Veo</option>
<option value="kling">Kling AI</option>
<option value="sora">OpenAI Sora</option>
</select><select id="duration">
<option value="8">8 Seconds</option>
<option value="10">10 Seconds</option>
<option value="15">15 Seconds</option>
</select>
</div><div class="section">
<b>Content Topic</b><br>
<input type="text" id="topic" placeholder="contoh: kisah lucu abu nawas">
<input type="text" id="product" placeholder="produk affiliate (opsional)">
</div><div class="section">
<b>Viral Hook Generator</b><br>
<button class="orange" onclick="generateHooks()">Generate 5 Hooks</button>
<textarea id="hooks" style="width:100%;height:90px;border-radius:8px;border:none;margin-top:8px"></textarea>
</div><div class="section">
<b>Auto Story Generator</b><br>
<button onclick="autoStory()">Create 10 Scene Story</button>
</div></div><div class="grid" id="imageGrid"></div><div class="controls">
<button onclick="generatePrompt()">Generate Video Prompts</button>
<button class="secondary" onclick="downloadTXT()">Download TXT</button>
<button class="dark" onclick="downloadJSON()">Download JSON</button>
</div><textarea id="output" placeholder="Generated prompts, hooks, and scripts will appear here..."></textarea><div class="footer">© 2026 Ghany Media Tools V3 – AI Content Factory. All Rights Reserved.</div>
</div><script>
const grid=document.getElementById('imageGrid');

for(let i=1;i<=10;i++){
let div=document.createElement('div');
div.className='box';

div.innerHTML=`
<label><b>Scene ${i}</b></label>
<input type="file" accept="image/*" onchange="previewImage(event,${i})">
<img id="preview${i}" style="display:none">
<textarea id="dialog${i}" placeholder="dialog karakter..."></textarea>`;

grid.appendChild(div); }

function previewImage(event,i){ const img=document.getElementById('preview'+i); img.src=URL.createObjectURL(event.target.files[0]); img.style.display='block'; }

function generateHooks(){ let topic=document.getElementById('topic').value||"cerita menarik"; let product=document.getElementById('product').value;

let hooks=[ "Kamu tidak akan percaya apa yang terjadi dalam cerita ini...", "Banyak orang tidak tahu kisah ini...", "Cerita ini bikin orang tercengang!", "Apa yang terjadi selanjutnya benar-benar di luar dugaan...", "Ini alasan kenapa cerita ini viral di internet..." ];

let result="";

hooks.forEach((h,i)=>{ result+=Hook ${i+1}: ${h} (${topic}${product?" + " + product:""})\n; });

document.getElementById('hooks').value=result; }

function autoStory(){ let topic=document.getElementById('topic').value||"sebuah cerita";

for(let i=1;i<=10;i++){ let dialog=document.getElementById('dialog'+i);

dialog.value=Bagian ${i} dari cerita tentang ${topic}.; } }

function generatePrompt(){ let model=document.getElementById('model').value; let duration=document.getElementById('duration').value; let prompt="";

for(let i=1;i<=10;i++){ let img=document.getElementById('preview'+i); let dialog=document.getElementById('dialog'+i).value;

if(img.src && img.style.display==='block'){

let base=Scene ${i}: ultra realistic cinematic video, natural human movement, detailed environment, ${duration} seconds, vertical 9:16.;

if(model==='kling'){ base=Scene ${i}: cinematic realism, expressive acting, natural lighting, ${duration}s vertical video.; }

if(model==='sora'){ base=Scene ${i}: photorealistic cinematic shot, realistic motion, ${duration} second vertical clip.; }

if(dialog.trim()!=""){ base+= Character says in Indonesian: \"${dialog}\".; }

prompt+=base+"\n\n"; } }

document.getElementById('output').value=prompt; }

function downloadTXT(){ let text=document.getElementById('output').value; let blob=new Blob([text],{type:'text/plain'}); let a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download="ghany_media_ai_content.txt";

a.click(); }

function downloadJSON(){ let scenes=[];

for(let i=1;i<=10;i++){ let dialog=document.getElementById('dialog'+i).value; if(dialog!=""){ scenes.push({scene:i,dialog:dialog}); } }

let blob=new Blob([JSON.stringify(scenes,null,2)],{type:'application/json'}); let a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download="ghany_media_project.json";

a.click(); } </script>

</body>
</html>
